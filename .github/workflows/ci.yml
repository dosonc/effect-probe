name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_NO_PROGRESS: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --locked
      - name: Check formatting
        run: uv run --locked ruff format --check .
      - name: Lint Python
        run: uv run --locked ruff check .
      - name: Check repository files
        env:
          SKIP: ruff-check,ruff-format
        run: uv run --locked pre-commit run --all-files --show-diff-on-failure
      - name: Check pull-request title
        if: github.event_name == 'pull_request'
        env:
          COMMIT_MESSAGE: ${{ github.event.pull_request.title }}
        run: >-
          uv run --locked cz check --message "$COMMIT_MESSAGE"
          --allowed-prefixes __none__ --message-length-limit 100
      - name: Check pushed commit subject
        if: github.event_name == 'push'
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          subject="${COMMIT_MESSAGE%%$'\n'*}"
          uv run --locked cz check --message "$subject" --allowed-prefixes __none__ --message-length-limit 100

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --locked
      - name: Run Pyright
        run: uv run --locked pyright

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --locked
      - name: Run tests
        run: uv run --locked pytest

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install Python
        run: uv python install 3.12
      - name: Verify lock file
        run: uv sync --locked
      - name: Build distributions
        run: uv build --no-sources
